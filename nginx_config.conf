# Nginx configuration for EduShare — OPTIMIZED

upstream edushare_app {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name edushare.uz www.edushare.uz;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name edushare.uz www.edushare.uz;

    ssl_certificate /etc/letsencrypt/live/edushare.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edushare.uz/privkey.pem;

    client_max_body_size 500M;

    # === PERFORMANCE: Gzip Compression ===
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # === PERFORMANCE: Buffer Optimization ===
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 4 32k;
    proxy_busy_buffers_size 64k;

    # Static files
    location /static/ {
        alias /home/react-edu-share-production/staticfiles/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Media files — Video Decode + Streaming
    location /media/ {
        alias /home/react-edu-share-production/media/;
        add_header Accept-Ranges bytes;

        types {
            video/mp4 mp4;
            video/webm webm;
            video/ogg ogg;
            video/quicktime mov;
            image/jpeg jpg jpeg;
            image/png png;
            image/svg+xml svg;
            image/webp webp;
        }

        expires 30d;
        access_log off;
    }

    # API, Admin, Django apps → proxy to Django
    location ~ ^/(api|edushare-boshqaruv-2026|accounts|core|profile|courses|sitemap\.xml|robots\.txt) {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_pass http://edushare_app;
    }

    # Main application (React)
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_pass http://edushare_app;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Anti-debug.js
    location = /anti-debug.js {
        alias /home/react-edu-share-production/staticfiles/anti-debug.js;
        add_header Content-Type application/javascript;
    }
}