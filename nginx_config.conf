# Nginx configuration for EduShare

upstream edushare_app {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name edushare.uz www.edushare.uz;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name edushare.uz www.edushare.uz;

    ssl_certificate /etc/letsencrypt/live/edushare.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edushare.uz/privkey.pem;

    client_max_body_size 500M;

    # Static files
    location /static/ {
        alias /home/react-edu-share-production/staticfiles/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Media files - Critical for Video Decode Success
    location /media/ {
        alias /home/react-edu-share-production/media/;
        add_header Accept-Ranges bytes;
        
        # Explicit types to ensure browser decode success
        types {
            video/mp4 mp4;
            video/webm webm;
            video/ogg ogg;
            video/quicktime mov;
            image/jpeg jpg jpeg;
            image/png png;
            image/svg+xml svg;
            image/webp webp;
        }
        
        expires 30d;
        access_log off;
    }

    # API & Admin
    location ~ ^/(api|admin|accounts) {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_pass http://edushare_app;
    }

    # Main application (React)
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_pass http://edushare_app;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SEO - Explicitly proxy to Django
    location = /robots.txt {
        proxy_pass http://edushare_app;
    }

    location = /sitemap.xml {
        proxy_pass http://edushare_app;
    }
}