# Nginx configuration for EduShare
# File: /etc/nginx/sites-available/edushare

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

# Upstream Gunicorn
upstream edushare_app {
    server 127.0.0.1:8000 fail_timeout=0;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name edushare.uz www.edushare.uz;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name edushare.uz www.edushare.uz;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/edushare.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edushare.uz/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/edushare.uz/chain.pem;

    # SSL configuration - A+ rating
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/edushare-access.log;
    error_log /var/log/nginx/edushare-error.log;

    # File upload size
    client_max_body_size 500M;
    client_body_buffer_size 128k;

    # Timeouts
    client_body_timeout 300;
    client_header_timeout 60;
    keepalive_timeout 15;
    send_timeout 300;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Static files - Simplest approach to avoid "Black Screen"
    location /static/ {
        alias /home/react-edu-share-production/staticfiles/;
        access_log off;
    }

    # Video specifically (to fix decode error)
    location ~* \.(mp4|webm|ogg|ogv)$ {
        root /home/react-edu-share-production;
        add_header Cache-Control "public, max-age=31536000";
        add_header Accept-Ranges bytes;
        try_files $uri =404;
    }

    # Media files
    location /media/ {
        proxy_pass http://edushare_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Favicon
    location = /favicon.ico {
        alias /home/react-edu-share-production/staticfiles/assets/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # Robots & Sitemap
    location = /robots.txt { proxy_pass http://edushare_app; }
    location = /sitemap.xml { proxy_pass http://edushare_app; }

    # API & Admin 
    location /api/ {
        proxy_pass http://edushare_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Main application (React)
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://edushare_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}